<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Focus Flow</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22white%22 stroke=%22%237d68c2%22 stroke-width=%224%22/><text x=%2250%22 y=%2266%22 font-size=%2256%22 font-family=%22Arial,sans-serif%22 font-weight=%22bold%22 fill=%22%237d68c2%22 text-anchor=%22middle%22>E</text><rect x=%2225%22 y=%2280%22 width=%2250%22 height=%228%22 rx=%224%22 fill=%22%233fd0c9%22/></svg>">
<link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <h1><img id="app-logo" src="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 rx=%2222%22 fill=%22white%22 stroke=%22%237d68c2%22 stroke-width=%224%22/><text x=%2250%22 y=%2266%22 font-size=%2256%22 font-family=%22Arial,sans-serif%22 font-weight=%22bold%22 fill=%22%237d68c2%22 text-anchor=%22middle%22>E</text><rect x=%2225%22 y=%2280%22 width=%2250%22 height=%228%22 rx=%224%22 fill=%22%233fd0c9%22/></svg>" alt="E logo"> Focus Flow</h1>
    <nav>
      <button class="tab active" data-view="planned">Planned</button>
      <button class="tab" data-view="active">Working On</button>
      <button class="tab" data-view="history">History</button>
      <button class="tab" data-view="stats">Stats</button>
    </nav>
  </header>

  <main>
    <!-- PLANNED VIEW -->
    <section id="view-planned" class="view active">
      <p id="planned-count" class="task-count"></p>
      <form id="add-form">
        <input id="task-title" type="text" placeholder="What's the homework?" required>
        <textarea id="task-notes" placeholder="Details (optional) — e.g. pages, instructions..."></textarea>
        <div class="due-date-row">
          <label for="task-due">Due date: <input id="task-due" type="date"></label>
          <button id="no-due-btn" type="button" class="no-due-btn">No Due Date</button>
        </div>
        <select id="task-subject">
          <option value="">No Subject</option>
          <option value="math">Math</option>
          <option value="science">Science</option>
          <option value="english">English</option>
          <option value="history">History</option>
          <option value="other">Other</option>
        </select>
        <label id="photo-label" for="task-photo">📷 Add Photos (up to 10)</label>
        <input id="task-photo" type="file" accept="image/*" capture="environment" multiple class="hidden">
        <div id="photo-preview-gallery" class="photo-gallery"></div>
        <button type="submit" id="submit-btn">Add to Planned</button>
        <button type="button" id="cancel-edit-btn" class="hidden">Cancel Edit</button>
      </form>

      <div id="today-section" class="hidden">
        <h3 class="section-heading">📌 Due Today / Overdue</h3>
        <ul id="today-list" class="task-list"></ul>
      </div>

      <input id="search-input" type="text" placeholder="🔍 Search planned tasks...">
      <ul id="planned-list" class="task-list"></ul>
    </section>

    <!-- ACTIVE VIEW -->
    <section id="view-active" class="view">
      <div id="active-empty" class="empty-msg">No task in progress. Pick one from Planned!</div>

      <div id="active-task" class="active-task hidden">
        <h2 id="active-title"></h2>
        <p id="active-due" class="due-label"></p>
        <div id="active-photo-gallery" class="photo-gallery"></div>
        <p id="active-notes"></p>

        <div class="progress-photos">
          <h3 id="active-photos-heading">In-Progress Photos</h3>
          <div id="progress-photo-gallery" class="photo-gallery"></div>
          <label id="progress-photo-label" for="progress-photo-input">📷 Add Progress Photo (up to 10)</label>
          <input id="progress-photo-input" type="file" accept="image/*" capture="environment" multiple class="hidden">
        </div>

        <button id="mark-done-btn" class="done-btn">Mark Done ✓</button>
      </div>

      <div id="break-prompt" class="active-task hidden">
        <h2>Nice work! Take a break?</h2>
        <button id="no-break-btn">No Break</button>
        <div class="break-setup">
          <label>Break length (minutes): <input id="break-minutes" type="number" min="1" value="10"></label>
          <button id="start-break-btn">Start Break Timer</button>
        </div>
      </div>

      <div id="break-running" class="active-task hidden">
        <h2>On a break</h2>
        <p id="ambient-note" class="ambient-note">🎵 Playing calming music</p>
        <div id="timer-display">10:00</div>
        <button id="mute-music-btn" type="button">🔇 Stop Music</button>
        <button id="stop-break-btn">End Break</button>
      </div>
    </section>

    <!-- HISTORY VIEW -->
    <section id="view-history" class="view">
      <p id="export-reminder" class="export-reminder hidden"></p>
      <div id="history-actions">
        <button id="delete-selected-btn">Delete Selected</button>
        <button id="delete-all-btn">Delete All</button>
        <button id="export-btn">⬇️ Export Data</button>
        <button id="import-btn">⬆️ Import Data</button>
        <input id="import-file" type="file" accept="application/json" class="hidden">
      </div>
      <ul id="history-list" class="task-list"></ul>
    </section>

    <!-- STATS VIEW -->
    <section id="view-stats" class="view">
      <div id="stats-grid" class="stats-grid"></div>
    </section>
  </main>

  <!-- LIGHTBOX -->
  <div id="lightbox" class="modal hidden">
    <button id="lightbox-close">×</button>
    <img id="lightbox-img">
  </div>

  <!-- DETAIL MODAL -->
  <div id="detail-modal" class="modal hidden">
    <div class="modal-content">
      <button id="close-modal">×</button>
      <h2 id="detail-title"></h2>
      <p id="detail-due" class="due-label"></p>
      <div id="detail-photo-gallery" class="photo-gallery"></div>
      <p id="detail-notes"></p>
      <p id="detail-meta"></p>
      <div id="detail-progress-section" class="progress-photos hidden">
        <h3 id="detail-progress-heading">Completed Photos</h3>
        <div id="detail-progress-gallery" class="photo-gallery"></div>
      </div>
    </div>
  </div>

  <!-- UNDO TOAST -->
  <div id="undo-toast" class="hidden">
    <span id="undo-toast-text"></span>
    <button id="undo-btn">Undo</button>
  </div>

  <script src="script.js"></script>
</body>
</html>
